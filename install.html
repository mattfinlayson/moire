<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moire — R1 Creation QR Code</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0e0e10; color: #fff;
  font-family: -apple-system, sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px 20px;
  gap: 20px;
}
h1 { font-size: 22px; font-weight: 700; }
h1 span { color: #FE5000; }
.subtitle { font-size: 14px; color: rgba(255,255,255,0.45); text-align: center; max-width: 340px; line-height: 1.5; }
#qr { margin-bottom: 4px; }
.url { font-size: 11px; color: rgba(255,255,255,0.25); word-break: break-all; text-align: center; max-width: 300px; }
.instructions {
  background: #111;
  border: 1px solid #222;
  border-radius: 10px;
  padding: 16px 20px;
  max-width: 380px;
  width: 100%;
}
.instructions h2 {
  font-size: 13px;
  font-weight: 600;
  color: #FE5000;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}
.instructions ol {
  padding-left: 18px;
  font-size: 13px;
  color: #bbb;
  line-height: 1.7;
}
</style>
</head>
<body>
<h1>✨ <span>Moire</span></h1>
<p class="subtitle">AI Photo Camera for Rabbit R1 — scan to install</p>
<div id="qr"></div>
<div class="url" id="url-label"></div>

<div class="instructions">
  <h2>How to install</h2>
  <ol>
    <li>On your R1, open the <strong>Creations</strong> scanner</li>
    <li>Point the camera at the QR code above</li>
    <li>The creation installs automatically</li>
    <li>Find it in your R1 app drawer</li>
  </ol>
</div>

<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
<script>
  var base = (function() {
    var b = window.location.href.replace(/\/install\.html.*$/, '');
    return b.endsWith('/') ? b : b + '/';
  })();

  var creationUrl = base + 'index.html';
  document.getElementById('url-label').textContent = creationUrl;

  var qrData = JSON.stringify({
    title: "Moire",
    url: creationUrl,
    description: "AI photo camera - pick a preset, take a photo",
    iconUrl: base + 'icon.svg',
    themeColor: "#FE5000"
  });

  var qrCode = new QRCodeStyling({
    width: 364, height: 364,
    data: qrData,
    dotsOptions: { color: "#ffffff", type: "rounded" },
    backgroundOptions: { color: "#0e0e10" },
    cornersSquareOptions: { color: "#FE5000", type: "extra-rounded" },
    cornersDotOptions: { color: "#FE5000" }
  });
  qrCode.append(document.getElementById('qr'));
</script>
</body>
</html>
